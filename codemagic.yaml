workflows:
  ios-app:
    name: 自动构建分发 kos iOS
    max_build_duration: 30
    
    integrations:
      app_store_connect: codemagic  # 在 Codemagic 后台配置

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.kos.app
      vars:
        XCODE_PROJECT: "kos.xcodeproj"
        SCHEME: "kos"
        PGYER_API_KEY: $PGYER_API_KEY  # 在 Codemagic Environment variables 中设置
      xcode: latest
      cocoapods: default

    scripts:
      - name: 设置 Build Number
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          agvtool new-version -all $BUILD_NUMBER

      - name: 构建 IPA
        script: |
          xcodebuild build -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -quiet

      - name: 上传到蒲公英
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -n "$IPA_PATH" ] && [ -n "$PGYER_API_KEY" ]; then
            curl -sS \
              -F "file=@${IPA_PATH}" \
              -F "_api_key=${PGYER_API_KEY}" \
              -F "buildUpdateDescription=Codemagic 自动构建" \
              https://www.pgyer.com/apiv2/app/upload
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - your@email.com  # 改为你的邮箱
        notify:
          success: true
          failure: true

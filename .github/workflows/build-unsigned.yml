name: 免签构建 + 免费分发

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  PROJECT_NAME: kos
  SCHEME: kos

jobs:
  build-unsigned:
    runs-on: macos-14
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 选择 Xcode
      run: |
        XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        xcodebuild -version

    - name: 设置版本号
      run: |
        BUILD_NUMBER=$(date +%Y%m%d%H%M)
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
        echo "VERSION=1.0.$BUILD_NUMBER" >> $GITHUB_ENV

    - name: 构建 .app (无签名)
      run: |
        xcodebuild build \
          -project ${PROJECT_NAME}.xcodeproj \
          -scheme ${SCHEME} \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CURRENT_PROJECT_VERSION=${BUILD_NUMBER} \
          -quiet

    - name: 打包为 IPA
      run: |
        mkdir -p build/Payload
        APP_PATH=$(find ./DerivedData -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "错误: 找不到 .app 文件"
          exit 1
        fi
        
        echo "APP 路径: $APP_PATH"
        cp -r "$APP_PATH" build/Payload/
        
        cd build
        zip -r -q ${PROJECT_NAME}-v${VERSION}.ipa Payload
        rm -rf Payload
        
        ls -lh *.ipa
        echo "IPA_NAME=${PROJECT_NAME}-v${VERSION}.ipa" >> $GITHUB_ENV

    # ========== 免费分发：GitHub Releases ==========
    - name: 发布到 GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.VERSION }}
        name: kos v${{ env.VERSION }}
        body: |
          ## kos iOS App v${{ env.VERSION }}
          
          **构建时间:** ${{ env.BUILD_NUMBER }}
          
          ### 安装方法（免签 IPA）
          
          1. **下载** 下方的 `${{ env.IPA_NAME }}` 文件
          2. **安装到手机**（选一种方式）:
             - [Sideloadly](https://sideloadly.io) - Windows/Mac
             - [AltStore](https://altstore.io) - Windows/Mac  
             - 爱思助手 / 牛蛙助手 - Windows
             - TrollStore（如果手机支持）
          
          > 使用免费 Apple ID 签名的 App 每 7 天需重新安装
        files: build/${{ env.IPA_NAME }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ========== 蒲公英分发 ==========
    - name: 上传到蒲公英
      if: env.PGYER_API_KEY != ''
      env:
        PGYER_API_KEY: ${{ secrets.PGYER_API_KEY }}
      run: |
        if [ -z "$PGYER_API_KEY" ]; then
          echo "未配置 PGYER_API_KEY，跳过蒲公英上传"
          exit 0
        fi
        echo ">>> 正在上传到蒲公英..."
        RESPONSE=$(curl -sS \
          -F "file=@build/${IPA_NAME}" \
          -F "_api_key=${PGYER_API_KEY}" \
          -F "buildUpdateDescription=自动构建 v${VERSION}" \
          https://www.pgyer.com/apiv2/app/upload)
        
        echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE"
        
        BUILD_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('data',{}).get('buildKey',''))" 2>/dev/null || echo "")
        BUILD_QRCODE=$(echo "$RESPONSE" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('data',{}).get('buildQRCodeURL',''))" 2>/dev/null || echo "")
        
        if [ -n "$BUILD_KEY" ]; then
          echo "PGYER_URL=https://www.pgyer.com/${BUILD_KEY}" >> $GITHUB_ENV
          echo "PGYER_QRCODE=${BUILD_QRCODE}" >> $GITHUB_ENV
          echo ""
          echo "============================================"
          echo "  蒲公英上传成功!"
          echo "  下载页: https://www.pgyer.com/${BUILD_KEY}"
          echo "  二维码: ${BUILD_QRCODE}"
          echo "============================================"
        else
          echo "蒲公英上传可能失败，请检查 API Key"
        fi

    - name: 上传 Artifact 备份
      uses: actions/upload-artifact@v4
      with:
        name: kos-${{ env.BUILD_NUMBER }}
        path: build/*.ipa
        retention-days: 90

    - name: 构建完成
      run: |
        echo "============================================"
        echo "  免签构建 + 分发成功!"
        echo ""
        echo "  版本: ${{ env.VERSION }}"
        echo "  GitHub: https://github.com/${{ github.repository }}/releases/latest"
        echo "  蒲公英: ${{ env.PGYER_URL }}"
        echo ""
        echo "  分享链接给用户即可下载安装"
        echo "============================================"
        echo "  - Sideloadly: https://sideloadly.io"
        echo "  - TrollStore (支持的 iOS 版本)"
        echo "  - 爱思助手 / 牛蛙助手"
        echo "============================================"

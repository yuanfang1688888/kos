name: 免签构建 + 免费分发

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  PROJECT_NAME: kos
  SCHEME: kos

jobs:
  build-unsigned:
    runs-on: macos-14
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 选择 Xcode
      run: |
        XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        xcodebuild -version

    - name: 设置版本号
      run: |
        BUILD_NUMBER=$(date +%Y%m%d%H%M)
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
        echo "VERSION=1.0.$BUILD_NUMBER" >> $GITHUB_ENV

    - name: 构建 .app (无签名)
      run: |
        xcodebuild build \
          -project ${PROJECT_NAME}.xcodeproj \
          -scheme ${SCHEME} \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CURRENT_PROJECT_VERSION=${BUILD_NUMBER} \
          -quiet

    - name: 打包为 IPA
      run: |
        mkdir -p build/Payload
        APP_PATH=$(find ./DerivedData -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "错误: 找不到 .app 文件"
          exit 1
        fi
        
        echo "APP 路径: $APP_PATH"
        cp -r "$APP_PATH" build/Payload/
        
        cd build
        zip -r -q ${PROJECT_NAME}-v${VERSION}.ipa Payload
        rm -rf Payload
        
        ls -lh *.ipa
        echo "IPA_NAME=${PROJECT_NAME}-v${VERSION}.ipa" >> $GITHUB_ENV

    # ========== 免费分发：GitHub Releases ==========
    - name: 发布到 GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.VERSION }}
        name: kos v${{ env.VERSION }}
        body: |
          ## kos iOS App v${{ env.VERSION }}
          
          **构建时间:** ${{ env.BUILD_NUMBER }}
          
          ### 安装方法（免签 IPA）
          
          1. **下载** 下方的 `${{ env.IPA_NAME }}` 文件
          2. **安装到手机**（选一种方式）:
             - [Sideloadly](https://sideloadly.io) - Windows/Mac
             - [AltStore](https://altstore.io) - Windows/Mac  
             - 爱思助手 / 牛蛙助手 - Windows
             - TrollStore（如果手机支持）
          
          > 使用免费 Apple ID 签名的 App 每 7 天需重新安装
        files: build/${{ env.IPA_NAME }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 上传 Artifact 备份
      uses: actions/upload-artifact@v4
      with:
        name: kos-${{ env.BUILD_NUMBER }}
        path: build/*.ipa
        retention-days: 90

    - name: 构建完成
      run: |
        echo "============================================"
        echo "  免签构建 + 免费分发成功!"
        echo ""
        echo "  版本: ${{ env.VERSION }}"
        echo "  下载: https://github.com/${{ github.repository }}/releases/latest"
        echo ""
        echo "  分享这个链接给用户即可下载安装"
        echo "============================================"
        echo "  - Sideloadly: https://sideloadly.io"
        echo "  - TrollStore (支持的 iOS 版本)"
        echo "  - 爱思助手 / 牛蛙助手"
        echo "============================================"

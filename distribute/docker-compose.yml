version: '3.8'

services:
  kos-distribute:
    build: .
    container_name: kos-distribute
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./qrcodes:/app/public/qrcodes
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - BASE_URL=http://your-domain.com:3000
      - JWT_SECRET=change-me-to-a-random-string
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/admin"]
      interval: 30s
      timeout: 5s
      retries: 3
